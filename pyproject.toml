[project]
name = "libgen-python"
version = "0.1.0"

description = "Descargar Libros de la pagina de genesis library, usando una query y opciones de busqueda."

readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "scrapear",
  "system_admin",
  "tqdm",
  "beautifulsoup4",
]


[tool.uv.sources]
scrapear = { path = "../scrapear", editable = true }
system_admin = { path = "../system_admin", editable = true }

[project.scripts]
libg = "libg.cli:main"

[project.optional-dependencies]
dev = [
    "ipdb",
    "ipython==9.2.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"


[tool.setuptools.packages.find]
where = ["src"]
